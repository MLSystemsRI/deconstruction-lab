<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deconstruction Ontology — ML Systems</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    --orange: #F97316;
    --orange-dim: #F9731640;
    --orange-glow: #F9731620;
    --black: #0A0A0A;
    --surface: #141414;
    --elevated: #1E1E1E;
    --border: #2A2A2A;
    --text: #F5F5F5;
    --muted: #888;
    --green: #22C55E;
    --teal: #14B8A6;
    --blue: #60A5FA;
    --red: #EF4444;
    --yellow: #FFE500;
    --purple: #A78BFA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--black);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex; align-items: center; gap: 16px;
  }
  .header-mark {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--orange);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px; color: var(--black);
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header h1 span { color: var(--orange); }
  .header-stats {
    margin-left: auto;
    display: flex; gap: 24px; font-size: 12px; color: var(--muted);
  }
  .header-stats strong { color: var(--orange); font-weight: 600; }

  /* ── Nav tabs ── */
  .nav {
    display: flex; gap: 2px; padding: 0 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .nav button {
    background: none; border: none; color: var(--muted);
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 12px 20px; cursor: pointer; white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .nav button:hover { color: var(--text); }
  .nav button.active { color: var(--orange); border-bottom-color: var(--orange); }

  /* ── Panels ── */
  .panel { display: none; padding: 32px; max-width: 1400px; margin: 0 auto; }
  .panel.active { display: block; }

  /* ── Phase Flow ── */
  .phase-flow {
    display: flex; gap: 12px; overflow-x: auto; padding: 8px 0 24px;
  }
  .phase-card {
    min-width: 200px; flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }
  .phase-card:hover, .phase-card.selected {
    border-color: var(--orange);
    box-shadow: 0 0 30px var(--orange-glow);
    transform: translateY(-2px);
  }
  .phase-card .order {
    position: absolute; top: 12px; right: 12px;
    font-size: 11px; font-weight: 700; color: var(--orange);
    background: var(--orange-glow);
    border-radius: 4px; padding: 2px 8px;
  }
  .phase-card .code { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .phase-card .name { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .phase-card .type-badge {
    display: inline-block;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    padding: 2px 8px; border-radius: 4px;
    background: var(--elevated); color: var(--muted);
  }
  .phase-card .type-badge.structural { background: var(--orange-dim); color: var(--orange); }
  .phase-card .type-badge.logistics { background: rgba(20,184,166,0.2); color: var(--teal); }
  .phase-card .duration { font-size: 11px; color: var(--muted); margin-top: 8px; }
  .phase-arrow {
    display: flex; align-items: center; color: var(--border); font-size: 24px; flex-shrink: 0;
  }

  /* ── Phase Detail ── */
  .phase-detail {
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    display: none;
  }
  .phase-detail.visible { display: block; animation: fadeIn 0.3s ease; }
  .phase-detail h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .phase-detail h2 span { color: var(--orange); }
  .phase-detail .desc { color: var(--muted); font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
  .detail-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px;
  }
  .detail-box {
    background: var(--elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .detail-box h3 {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    color: var(--orange); margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .detail-box ul { list-style: none; }
  .detail-box ul li {
    font-size: 13px; padding: 3px 0; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .detail-box ul li::before { content: '›'; color: var(--orange); font-weight: 700; }
  .material-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .material-row:last-child { border-bottom: none; }
  .material-row .val { color: var(--green); font-weight: 600; font-size: 12px; }
  .material-row .rate { color: var(--muted); font-size: 11px; }

  /* ── Task Codes Table ── */
  .task-filters {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .task-filters button {
    background: var(--elevated); border: 1px solid var(--border);
    color: var(--muted); font-family: inherit; font-size: 12px; font-weight: 500;
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
    transition: all 0.2s;
  }
  .task-filters button:hover { border-color: var(--orange); color: var(--text); }
  .task-filters button.active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }

  .task-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px;
  }
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .task-card:hover { border-color: var(--orange); }
  .task-card .task-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 8px;
  }
  .task-card .task-code {
    font-family: monospace; font-size: 14px; font-weight: 700; color: var(--orange);
  }
  .task-card .task-phase {
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 4px; background: var(--elevated); color: var(--muted);
  }
  .task-card .task-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .task-card .task-desc { font-size: 12px; color: var(--muted); line-height: 1.4; margin-bottom: 10px; }
  .task-card .primitives {
    display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px;
  }
  .task-card .prim-tag {
    font-size: 10px; padding: 2px 6px;
    background: var(--orange-glow); color: var(--orange);
    border-radius: 3px; font-family: monospace;
  }
  .task-card .task-meta {
    display: flex; gap: 12px; font-size: 11px; color: var(--muted);
  }
  .task-card .task-meta .difficulty { display: flex; gap: 4px; }
  .task-card .task-meta .difficulty .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
  }
  .task-card .task-meta .difficulty .dot.filled { background: var(--orange); }
  .task-card .task-meta .difficulty .dot.robot { background: var(--blue); }

  .task-card .recovery-strip {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
    font-size: 11px;
  }
  .task-card .recovery-strip .rv { color: var(--green); font-weight: 600; }
  .task-card .recovery-strip .zone { color: var(--teal); }

  /* ── Primitives ── */
  .prim-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px;
  }
  .prim-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    transition: all 0.2s;
  }
  .prim-card:hover { border-color: var(--orange); }
  .prim-card .prim-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .prim-card .prim-id {
    font-family: monospace; font-size: 13px; font-weight: 700; color: var(--orange);
  }
  .prim-card .prim-cat {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    padding: 2px 8px; border-radius: 4px;
    background: var(--elevated); color: var(--muted);
  }
  .prim-card .prim-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .prim-card .prim-desc { font-size: 12px; color: var(--muted); line-height: 1.4; margin-bottom: 8px; }
  .prim-card .prim-meta { display: flex; gap: 16px; font-size: 11px; }
  .prim-card .prim-meta span { color: var(--muted); }
  .prim-card .prim-meta strong { color: var(--text); }
  .bridge-tag {
    display: inline-block; font-size: 10px; padding: 2px 6px;
    border-radius: 3px; font-weight: 600;
  }
  .bridge-tag.bridged { background: rgba(96,165,250,0.15); color: var(--blue); }
  .bridge-tag.decon { background: rgba(249,115,22,0.15); color: var(--orange); }

  .feasibility-bar {
    display: flex; gap: 2px; align-items: center;
  }
  .feasibility-bar .seg {
    width: 14px; height: 6px; border-radius: 2px;
    background: var(--border);
  }
  .feasibility-bar .seg.filled { background: var(--blue); }

  /* ── Materials ── */
  .zone-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;
  }
  .zone-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .zone-card:hover { border-color: var(--teal); }
  .zone-header {
    padding: 16px;
    background: linear-gradient(135deg, var(--elevated), var(--surface));
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .zone-header .zone-num {
    font-size: 28px; font-weight: 900; color: var(--teal); opacity: 0.7;
  }
  .zone-header .zone-info h3 { font-size: 15px; font-weight: 700; }
  .zone-header .zone-info .discount { font-size: 11px; color: var(--green); }
  .zone-body { padding: 12px 16px; }
  .mat-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .mat-item:last-child { border-bottom: none; }
  .mat-item .mat-name { flex: 1; }
  .mat-item .mat-rate { color: var(--muted); font-size: 11px; margin: 0 12px; }
  .mat-item .mat-value { color: var(--green); font-weight: 600; font-size: 12px; text-align: right; }

  /* ── Equipment ── */
  .equip-section { margin-bottom: 32px; }
  .equip-section h3 {
    font-size: 14px; font-weight: 700; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .equip-section h3::before {
    content: ''; width: 3px; height: 16px; border-radius: 2px;
    background: var(--orange);
  }
  .equip-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px;
  }
  .equip-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .equip-card .equip-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .equip-card .equip-cost { font-size: 12px; color: var(--green); margin-bottom: 4px; }
  .equip-card .equip-note { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .equip-card .equip-phases {
    display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap;
  }
  .equip-card .equip-phases span {
    font-size: 10px; font-weight: 600; padding: 2px 6px;
    background: var(--elevated); color: var(--muted); border-radius: 3px;
  }

  /* ── Crew ── */
  .crew-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 800px) { .crew-layout { grid-template-columns: 1fr; } }

  .crew-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .crew-group h3 {
    font-size: 14px; font-weight: 700; margin-bottom: 4px;
  }
  .crew-group .crew-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .role-card {
    background: var(--elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .role-card:last-child { margin-bottom: 0; }
  .role-card .role-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--orange); }
  .role-card .role-resp {
    list-style: none; font-size: 12px; color: var(--muted); line-height: 1.6;
  }
  .role-card .role-resp li::before { content: '• '; color: var(--orange); }

  .shift-timeline {
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .shift-timeline h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
  .timeline-blocks { display: flex; gap: 8px; }
  .timeline-block {
    flex: 1;
    background: var(--elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }
  .timeline-block .block-num {
    font-size: 28px; font-weight: 900; color: var(--orange); opacity: 0.5;
  }
  .timeline-block .block-time { font-size: 13px; font-weight: 600; margin: 4px 0; }
  .timeline-block .block-focus { font-size: 12px; color: var(--muted); }
  .timeline-block .block-dur {
    font-size: 10px; color: var(--orange); margin-top: 4px; font-weight: 600;
  }

  /* ── Summary Cards ── */
  .summary-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .summary-card .num {
    font-size: 32px; font-weight: 900; color: var(--orange);
  }
  .summary-card .label {
    font-size: 12px; color: var(--muted); margin-top: 4px;
  }

  /* ── Shift Timeline Table ── */
  .shift-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .shift-table th {
    text-align: left; padding: 8px 10px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    color: var(--orange); letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  .shift-table td {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .shift-table tr:hover td { background: var(--elevated); }
  .shift-table .shift-num {
    font-weight: 800; color: var(--orange); font-size: 14px; text-align: center;
  }
  .shift-table .day-label {
    font-size: 10px; font-weight: 600; color: var(--muted); text-align: center;
  }
  .shift-table .time-labor { color: var(--text); font-weight: 500; }
  .shift-table .time-solve { color: var(--teal); font-weight: 500; }
  .shift-table .phase-work { color: var(--text); font-weight: 500; }
  .shift-table .crew-count {
    font-weight: 700; color: var(--orange); text-align: center;
  }
  .shift-table .constants-col { color: var(--muted); font-size: 11px; }
  .day-divider td {
    background: var(--orange-glow) !important;
    font-weight: 700; color: var(--orange); font-size: 12px;
    text-align: center; padding: 6px;
  }

  .the45-box {
    background: linear-gradient(135deg, rgba(20,184,166,0.08), rgba(249,115,22,0.08));
    border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-top: 20px;
  }
  .the45-box h4 { font-size: 13px; font-weight: 700; color: var(--teal); margin-bottom: 10px; }
  .the45-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px;
  }
  .the45-item {
    background: var(--elevated); border-radius: 6px; padding: 8px 10px;
    font-size: 11px;
  }
  .the45-item .platform { font-weight: 600; color: var(--orange); font-size: 10px; }
  .the45-item .activity { color: var(--text); margin-top: 2px; }

  .capacity-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px; margin-top: 16px;
  }
  .capacity-card {
    background: var(--elevated); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; text-align: center;
  }
  .capacity-card .cap-num { font-size: 24px; font-weight: 800; color: var(--green); }
  .capacity-card .cap-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--orange); }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .nav { padding: 0 16px; }
    .panel { padding: 16px; }
    .phase-card { min-width: 160px; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-mark">DL</div>
  <h1><span>Deconstruction</span> Ontology</h1>
  <div class="header-stats">
    <span><strong>6</strong> Phases</span>
    <span><strong>55</strong> Task Codes</span>
    <span><strong>45</strong> Primitives</span>
    <span><strong>8</strong> Material Zones</span>
    <span><strong>v0.1.0</strong></span>
  </div>
</div>

<div class="nav">
  <button class="active" onclick="showPanel('phases')">Phases</button>
  <button onclick="showPanel('tasks')">Task Codes</button>
  <button onclick="showPanel('primitives')">Primitives</button>
  <button onclick="showPanel('materials')">Materials</button>
  <button onclick="showPanel('equipment')">Equipment</button>
  <button onclick="showPanel('crew')">Crew Model</button>
</div>

<!-- ═══════════ PHASES ═══════════ -->
<div class="panel active" id="panel-phases">
  <div class="summary-row">
    <div class="summary-card"><div class="num">2</div><div class="label">Day Timeline</div></div>
    <div class="summary-card"><div class="num">2,500</div><div class="label">SF Target Home</div></div>
    <div class="summary-card"><div class="num">80–90%</div><div class="label">Material Recovery</div></div>
    <div class="summary-card"><div class="num">51%</div><div class="label">Resale Value</div></div>
    <div class="summary-card"><div class="num">5–8</div><div class="label">Crew Size</div></div>
  </div>

  <div class="phase-flow" id="phase-flow"></div>
  <div class="phase-detail" id="phase-detail"></div>
</div>

<!-- ═══════════ TASK CODES ═══════════ -->
<div class="panel" id="panel-tasks">
  <div class="task-filters" id="task-filters"></div>
  <div class="task-grid" id="task-grid"></div>
</div>

<!-- ═══════════ PRIMITIVES ═══════════ -->
<div class="panel" id="panel-primitives">
  <div class="task-filters" id="prim-filters"></div>
  <div class="prim-grid" id="prim-grid"></div>
</div>

<!-- ═══════════ MATERIALS ═══════════ -->
<div class="panel" id="panel-materials">
  <div class="summary-row">
    <div class="summary-card"><div class="num" style="color:var(--green)">$7.8K–$20.4K+</div><div class="label">BOH Revenue / Home</div></div>
    <div class="summary-card"><div class="num" style="color:var(--green)">$32K–$91K</div><div class="label">Swing vs Conventional</div></div>
  </div>
  <div class="zone-grid" id="zone-grid"></div>
</div>

<!-- ═══════════ EQUIPMENT ═══════════ -->
<div class="panel" id="panel-equipment">
  <div id="equip-container"></div>
</div>

<!-- ═══════════ CREW ═══════════ -->
<div class="panel" id="panel-crew">
  <div class="crew-layout" id="crew-layout"></div>
  <div class="shift-timeline" id="shift-timeline"></div>
</div>

<script>

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');

// Phases
function renderPhases() {
  const flow = document.getElementById('phase-flow');
  phases.forEach((p, i) => {
    if (i > 0) flow.innerHTML += '<div class="phase-arrow">→</div>';
    flow.innerHTML += `
      <div class="phase-card" onclick="selectPhase(${i})" id="pc-${i}">
        <div class="order">${p.order}</div>
        <div class="code">${p.code}</div>
        <div class="name">${p.name}</div>
        <div class="type-badge ${p.type}">${p.type}</div>
        <div class="duration">${p.duration}</div>
      </div>`;
  });
}

function selectPhase(i) {
  document.querySelectorAll('.phase-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('pc-' + i).classList.add('selected');
  const p = phases[i];
  const det = document.getElementById('phase-detail');
  let matHtml = '';
  if (Object.keys(p.materialOutput).length) {
    matHtml = Object.entries(p.materialOutput).map(([k,v]) =>
      `<div class="material-row"><span>${k.replace(/_/g,' ')}</span><span class="rate">${v.recovery}</span><span class="val">${v.value}</span></div>`
    ).join('');
  } else {
    matHtml = '<div style="color:var(--muted);font-size:13px">Logistics phase — no direct material output</div>';
  }
  det.innerHTML = `
    <h2><span>${p.code}</span> — ${p.name}</h2>
    <div class="desc">${p.description}</div>
    <div class="detail-grid">
      <div class="detail-box"><h3>Task Codes (${p.taskCodes.length})</h3><ul>${p.taskCodes.map(t => `<li>${t}</li>`).join('')}</ul></div>
      <div class="detail-box"><h3>Material Recovery</h3>${matHtml}</div>
      <div class="detail-box"><h3>Safety Focus</h3><div style="font-size:13px;line-height:1.5">${p.safetyFocus}</div></div>
      <div class="detail-box"><h3>Crew</h3><ul>${p.crewRequired.map(c => `<li>${c.replace(/_/g,' ')}</li>`).join('')}</ul></div>
      <div class="detail-box"><h3>Equipment</h3><ul>${p.equipmentRequired.map(e => `<li>${e.replace(/_/g,' ')}</li>`).join('')}</ul></div>
      <div class="detail-box"><h3>Humanoid Bridge</h3><ul>${p.humanoidBridge.map(h => `<li>${h}</li>`).join('')}</ul>${p.rdNote ? `<div style="margin-top:8px;font-size:12px;color:var(--yellow)">${p.rdNote}</div>` : ''}</div>
    </div>`;
  det.classList.add('visible');
}

// Tasks
function renderTasks() {
  const allPhases = [...new Set(tasks.map(t => t.phase))];
  const filters = document.getElementById('task-filters');
  filters.innerHTML = `<button class="active" onclick="filterTasks('ALL')">All (${tasks.length})</button>` +
    allPhases.map(p => `<button onclick="filterTasks('${p}')">${p} (${tasks.filter(t=>t.phase===p).length})</button>`).join('');
  filterTasks('ALL');
}

function filterTasks(phase) {
  document.querySelectorAll('#task-filters button').forEach(b => {
    b.classList.toggle('active', b.textContent.startsWith(phase === 'ALL' ? 'All' : phase));
  });
  const filtered = phase === 'ALL' ? tasks : tasks.filter(t => t.phase === phase);
  const grid = document.getElementById('task-grid');
  grid.innerHTML = filtered.map(t => {
    const hDots = Array.from({length:5},(_,i) => `<div class="dot ${i < t.difficulty.h ? 'filled' : ''}"></div>`).join('');
    const rDots = Array.from({length:5},(_,i) => `<div class="dot ${i < t.difficulty.r ? 'robot' : ''}"></div>`).join('');
    const recHtml = t.recovery ? `<div class="recovery-strip"><span>${t.recovery.rate}</span><span class="rv">${t.recovery.value}</span>${t.recovery.zone ? `<span class="zone">Z${t.recovery.zone}</span>` : ''}</div>` : '';
    return `
      <div class="task-card">
        <div class="task-header">
          <span class="task-code">${t.code}</span>
          <span class="task-phase">${t.phase}${t.dcn !== '—' ? ` · ${t.dcn}` : ''}</span>
        </div>
        <div class="task-name">${t.name}</div>
        <div class="task-desc">${t.desc}</div>
        <div class="primitives">${t.primitives.map(p => `<span class="prim-tag">${p}</span>`).join('')}</div>
        <div class="task-meta">
          <span>${t.mins}min</span>
          <span>×${t.crew}</span>
          <span>H:<span class="difficulty">${hDots}</span></span>
          <span>R:<span class="difficulty">${rDots}</span></span>
        </div>
        ${recHtml}
      </div>`;
  }).join('');
}

function renderPrimitives() {
  const cats = [...new Set(primitives.map(p => p.cat))];
  const filters = document.getElementById('prim-filters');
  filters.innerHTML = `<button class="active" onclick="filterPrims('ALL')">All (${primitives.length})</button>` +
    cats.map(c => `<button onclick="filterPrims('${c}')">${c.replace(/_/g,' ')} (${primitives.filter(p=>p.cat===c).length})</button>`).join('');
  filterPrims('ALL');
}

function filterPrims(cat) {
  document.querySelectorAll('#prim-filters button').forEach(b => {
    b.classList.toggle('active', b.textContent.startsWith(cat === 'ALL' ? 'All' : cat.replace(/_/g,' ')));
  });
  const filtered = cat === 'ALL' ? primitives : primitives.filter(p => p.cat === cat);
  const grid = document.getElementById('prim-grid');
  grid.innerHTML = filtered.map(p => {
    const segs = Array.from({length:5},(_,i) => `<div class="seg ${i < p.rf ? 'filled' : ''}"></div>`).join('');
    const bridge = p.hid ? `<span class="bridge-tag bridged">bridged</span>` : `<span class="bridge-tag decon">decon-specific</span>`;
    const relColor = p.rel === 'critical' ? 'var(--orange)' : p.rel === 'high' ? 'var(--text)' : 'var(--muted)';
    return `
      <div class="prim-card">
        <div class="prim-header">
          <span class="prim-id">${p.id}</span>
          <span class="prim-cat">${p.cat.replace(/_/g,' ')}</span>
        </div>
        <div class="prim-name">${p.name}</div>
        <div class="prim-desc">${p.desc}</div>
        <div class="prim-meta">
          ${bridge}
          <span>Robot: <span class="feasibility-bar">${segs}</span></span>
          <span style="color:${relColor};font-weight:600">${p.rel}</span>
        </div>
      </div>`;
  }).join('');
}

    {s:12,d:2,time:'4:45–7:00',labor:'4:45–6:15',solve:'6:15–7:00',phase:'POST: merchandising + cleanup',crew:3,constants:'Sal: final walkthrough, BOH review.'}
  ];

  const timeline = document.getElementById('shift-timeline');
  let tableRows = '';
  let lastDay = 0;
  shifts.forEach(sh => {
    if (sh.d !== lastDay) {
      tableRows += `<tr class="day-divider"><td colspan="6">DAY ${sh.d}</td></tr>`;
      lastDay = sh.d;
    }
    tableRows += `
      <tr>
        <td class="shift-num">${sh.s}</td>
        <td><span class="time-labor">${sh.labor}</span><br><span class="time-solve">${sh.solve}</span></td>
        <td class="phase-work">${sh.phase}</td>
        <td class="crew-count">${sh.crew}</td>
        <td class="constants-col">${sh.constants}</td>
      </tr>`;
  });

  timeline.innerHTML = `
    <h3>12-Shift Schedule — 6 per Day × 2 Days</h3>
    <div style="font-size:12px;color:var(--muted);margin-bottom:16px">
      Site day: 5:30 AM – 7:00 PM (13.5 hrs). Each shift = <strong style="color:var(--orange)">90 min labor</strong> + <strong style="color:var(--teal)">45 min solve</strong> = 2.25 hrs.
    </div>
    <div style="overflow-x:auto">
      <table class="shift-table">
        <thead>
          <tr><th>#</th><th>Labor / Solve</th><th>Phase Work</th><th>Crew</th><th>Constants</th></tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>

    <div class="the45-box">
      <h4>The 45 Is Not a Break — It's the Other Half of the Job</h4>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5">
        You do 90 minutes of sustained physical work. Then you stop. Step back. Ask: <em>What took too long? What broke? What's the better way?</em> Then go back in with the insight. The labor is the body. The 45 is the brain. <strong style="color:var(--text)">Both are compensated.</strong>
      </div>
      <div class="the45-grid">
        <div class="the45-item"><div class="platform">BOH</div><div class="activity">Photograph materials you just pulled — listings go live during decon</div></div>
        <div class="the45-item"><div class="platform">BOH</div><div class="activity">Write descriptions, set prices — you touched it, you know its condition</div></div>
        <div class="the45-item"><div class="platform">Decon Lab</div><div class="activity">Log material conditions, separation times — trains model for next house</div></div>
        <div class="the45-item"><div class="platform">Design Studio</div><div class="activity">Record dimensions, species, grades — material reference library</div></div>
        <div class="the45-item"><div class="platform">Social</div><div class="activity">Shoot video of process/progress — real content from real work</div></div>
        <div class="the45-item"><div class="platform">Client App</div><div class="activity">Update project status, log hours — tracking, billing</div></div>
        <div class="the45-item"><div class="platform">Internal</div><div class="activity">Help plan next shift's work — problem-solve with Sal and the constants</div></div>
      </div>
    </div>

    <div style="margin-top:16px;padding:16px;background:var(--elevated);border-radius:8px;border:1px solid var(--border)">
      <div style="font-size:12px;color:var(--muted);line-height:1.6">
        <strong style="color:var(--yellow)">Lucent Lens:</strong> When the shift crew stops to think, Sal is the person they think WITH. A Shift 2 crew member notices trim pulls faster from the bottom — Sal carries that to Shift 3. The operation gets smarter every 2.25 hours. This is "utilize the person, not the process" in practice.
      </div>
    </div>

    <div class="capacity-grid">
      <div class="capacity-card"><div class="cap-num">~140</div><div class="cap-label">Total Person-Hours</div></div>
      <div class="capacity-card"><div class="cap-num">+42%</div><div class="cap-label">vs Conventional (98 hrs)</div></div>
      <div class="capacity-card"><div class="cap-num">12</div><div class="cap-label">Crane Windows (hrs)</div></div>
      <div class="capacity-card"><div class="cap-num">28.5</div><div class="cap-label">Brokk Runway (hrs)</div></div>
    </div>
    <div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap">
      <div class="summary-card" style="flex:1;min-width:120px"><div class="num">5</div><div class="label">Min Crew</div></div>
      <div class="summary-card" style="flex:1;min-width:120px"><div class="num">7</div><div class="label">Optimal Crew</div></div>
      <div class="summary-card" style="flex:1;min-width:120px"><div class="num" style="color:var(--orange)">90</div><div class="label">Min Labor</div></div>
      <div class="summary-card" style="flex:1;min-width:120px"><div class="num" style="color:var(--teal)">45</div><div class="label">Min Solve</div></div>
      <div class="summary-card" style="flex:1;min-width:120px"><div class="num">6</div><div class="label">Shifts / Day</div></div>
      <div class="summary-card" style="flex:1;min-width:120px"><div class="num">12</div><div class="label">Total Shifts</div></div>
    </div>`;
}

// Init
renderPhases();
renderTasks();
renderPrimitives();
renderMaterials();
renderEquipment();
renderCrew();
selectPhase(0);
</script>
</body>
</html>
